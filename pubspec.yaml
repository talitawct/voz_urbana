name: voz_urbana
description: "Projeto Voz Urbana - Faculdade"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Recursos do Dispositivo e Mapa (Exigidos pela professora)
  camera: ^0.12.0+1
  geolocator: ^11.1.0
  google_maps_flutter: ^2.6.0

  # Banco de Dados e Persistência
  sqflite: ^2.3.0
  path: ^1.9.0
  
  cloud_firestore: ^4.15.1
  firebase_core: ^2.25.4
  firebase_auth: ^5.1.2
  google_sign_in: ^6.2.1

  # Bônus (IA e APIs externas)
  tflite_flutter: ^0.10.4
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/